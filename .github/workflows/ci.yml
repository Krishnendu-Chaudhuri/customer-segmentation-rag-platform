name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e ".[dev]"

      - name: Security audit
        run: |
          # TODO: Remove --ignore-vuln PYSEC-2026-311 once chromadb ships a release
          # that fixes CVE-2026-45829 (ChromaDB FastAPI server pre-auth RCE).
          # This project uses PersistentClient only; the vulnerable server path is not exposed.
          pip-audit -r requirements.lock --ignore-vuln PYSEC-2026-311

      - name: Ruff lint
        run: ruff check src tests frontend

      - name: Run tests
        env:
          API_KEY: test-secret-key
        run: pytest tests/ -v

      - name: RAG eval suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          API_KEY: test-secret-key
        continue-on-error: true
        run: python -m shopper_segmentation.rag.evals.run_eval | tee eval-results.txt

      - name: Upload eval output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-results
          path: eval-results.txt
