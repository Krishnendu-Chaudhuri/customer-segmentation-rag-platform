services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  streamlit:
    build: .
    command: >
      streamlit run frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      API_BASE_URL: http://api:8000
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    depends_on:
      api:
        condition: service_healthy
